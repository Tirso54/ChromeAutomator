name: Build APK

# Se ejecuta en cada push a main y en pull requests
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  # También puedes ejecutarlo manualmente desde GitHub UI
  workflow_dispatch:

jobs:
  build:
    name: Build Debug & Release APK
    runs-on: ubuntu-latest   # Máquina gratuita de GitHub

    steps:
      # 1. Descargar el código del repositorio
      - name: Checkout código
        uses: actions/checkout@v4

      # 2. Configurar JDK 17 (requerido por AGP 8.x)
      - name: Configurar JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'   # Eclipse Temurin (antes AdoptOpenJDK)
          cache: gradle             # Cachea dependencias Gradle entre runs

      # 3. Dar permisos de ejecución al wrapper de Gradle
      - name: Permisos Gradle Wrapper
        run: chmod +x gradlew

      # 4. Compilar el APK de debug (más rápido, sin firma especial)
      - name: Build APK Debug
        run: ./gradlew assembleDebug --stacktrace

      # 5. Compilar el APK de release (firmado con debug key por ahora)
      - name: Build APK Release
        run: ./gradlew assembleRelease --stacktrace

      # 6. Subir el APK de debug como artefacto descargable
      - name: Subir APK Debug
        uses: actions/upload-artifact@v4
        with:
          name: ChromeAutomator-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30    # Días que se conserva el artefacto

      # 7. Subir el APK de release como artefacto descargable
      - name: Subir APK Release
        uses: actions/upload-artifact@v4
        with:
          name: ChromeAutomator-release
          path: app/build/outputs/apk/release/app-release*.apk
          retention-days: 30

      # ── OPCIONAL: Crear un Release de GitHub automáticamente ─────────────
      # Descomenta este bloque si quieres releases automáticos al hacer push
      # a main con un tag de versión (ej: git tag v1.0 && git push --tags)
      #
      # - name: Crear GitHub Release
      #   if: startsWith(github.ref, 'refs/tags/')
      #   uses: softprops/action-gh-release@v1
      #   with:
      #     files: app/build/outputs/apk/release/app-release*.apk
      #   env:
      #     GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
