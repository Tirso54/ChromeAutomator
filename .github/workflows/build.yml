name: Build APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build Debug & Release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Instalar Gradle 8.6
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.6'

      - name: Generar Gradle Wrapper
        run: gradle wrapper --gradle-version 8.6

      - name: Permisos gradlew
        run: chmod +x gradlew

      - name: Build APK Debug
        run: ./gradlew assembleDebug --stacktrace

      - name: Build APK Release
        run: ./gradlew assembleRelease --stacktrace

      - name: Subir APK Debug
        uses: actions/upload-artifact@v4
        with:
          name: ChromeAutomator-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Subir APK Release
        uses: actions/upload-artifact@v4
        with:
          name: ChromeAutomator-release
          path: app/build/outputs/apk/release/app-release*.apk
          retention-days: 30
